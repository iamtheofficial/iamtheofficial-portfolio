<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Iamtheofficial | The Vault" />
    <title>Iamtheofficial | The Vault</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>

  <body>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Back to homepage">
        <img
          src="assets/images/logo-dark-no-bg.png"
          alt="Iamtheofficial Homepage"
        />
      </a>
    </header>

    <main id="top">
      <section class="section-padding showcase-section">
        <div class="section-heading">
          <p class="eyebrow">Unreleased Collection</p>
          <h2>The Vault</h2>
          <p>
            This is a collection of some of my favourite unreleased songs/beats
            produced, written and performed by Iamtheofficial
          </p>
        </div>

        <div class="vault-player">
          <div class="now-playing">
            <p class="eyebrow">Now Playing</p>
            <h3 id="currentTitle">Select a track</h3>

            <audio id="mainAudioPlayer" preload="none"></audio>

            <div class="custom-player">
              <div class="player-progress">
                <span id="currentTime">0:00</span>
                <input
                  id="progressBar"
                  type="range"
                  value="0"
                  min="0"
                  max="100"
                  step="0.1"
                />
                <span id="duration">0:00</span>
              </div>

              <div class="player-controls">
                <button
                  id="prevBtn"
                  class="player-btn icon-btn"
                  type="button"
                  aria-label="Previous track"
                >
                  ⏮
                </button>
                <button
                  id="playPauseBtn"
                  class="player-btn main icon-btn"
                  type="button"
                  aria-label="Play"
                >
                  ▶
                </button>
                <button
                  id="nextBtn"
                  class="player-btn icon-btn"
                  type="button"
                  aria-label="Next track"
                >
                  ⏭
                </button>
              </div>
            </div>
          </div>

          <div id="playlist" class="playlist"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-socials">
        <a class="social-email" href="mailto:iamtheofficial.nz@gmail.com"
          >Email</a
        >

        <a
          class="social-facebook"
          href="https://www.facebook.com/iamtheofficialmusic/"
          target="_blank"
          rel="noopener noreferrer"
        >
          Facebook
        </a>

        <a
          class="social-instagram"
          href="https://www.instagram.com/iamtheofficial_/"
          target="_blank"
          rel="noopener noreferrer"
        >
          Instagram
        </a>

        <a
          class="social-spotify"
          href="https://open.spotify.com/artist/4lkMt02RqUWlrvBHsE11RC"
          target="_blank"
          rel="noopener noreferrer"
        >
          Spotify
        </a>

        <a
          class="social-apple"
          href="https://music.apple.com/us/artist/iamtheofficial/1240907282"
          target="_blank"
          rel="noopener noreferrer"
        >
          Apple Music
        </a>

        <a
          class="social-soundcloud"
          href="https://soundcloud.com/iamtheofficial"
          target="_blank"
          rel="noopener noreferrer"
        >
          SoundCloud
        </a>

        <a
          class="social-x"
          href="https://x.com/iamtheofficial_/"
          target="_blank"
          rel="noopener noreferrer"
        >
          X
        </a>
      </div>
      <p>© <span id="year"></span> Reuben James. All rights reserved.</p>
    </footer>

    <script src="vault.js"></script>
  </body>
</html>
